server {
    listen 80;
    listen [::]:80;
    server_name hatfixcleanmainfront.com www.hatfixcleanmainfront.com;

    root /var/www/hatfixcleanmainfront/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
